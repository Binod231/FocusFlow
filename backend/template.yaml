AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  FocusFlow — AI-Powered Task Prioritizer
  AWS Weekend Productivity Challenge 2026

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    Environment:
      Variables:
        TABLE_NAME: !Ref TaskHistoryTable
        AWS_ACCOUNT_ID: !Ref AWS::AccountId

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
    Description: Deployment stage

Resources:

  # ─────────────────────────────────────────────────────────────────────────
  # DynamoDB Table — Task History
  # ─────────────────────────────────────────────────────────────────────────
  TaskHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: FocusFlowSessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: FocusFlow

  # ─────────────────────────────────────────────────────────────────────────
  # Lambda Function
  # ─────────────────────────────────────────────────────────────────────────
  PrioritizeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: focusflow-prioritize
      CodeUri: lambda/
      Handler: handler.lambda_handler
      Description: Calls Bedrock Nova Lite to prioritize tasks
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-lite-v1:0"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource: !GetAtt TaskHistoryTable.Arn
      Events:
        PrioritizePost:
          Type: Api
          Properties:
            RestApiId: !Ref FocusFlowApi
            Path: /prioritize
            Method: post
        PrioritizeOptions:
          Type: Api
          Properties:
            RestApiId: !Ref FocusFlowApi
            Path: /prioritize
            Method: options

  # ─────────────────────────────────────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────────────────────────────────────
  FocusFlowApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: focusflow-api
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'POST, OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"
      Tags:
        Project: FocusFlow

# ─────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: "FocusFlow API Gateway endpoint URL"
    Value: !Sub "https://${FocusFlowApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/prioritize"
    Export:
      Name: FocusFlowApiUrl

  FunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt PrioritizeFunction.Arn

  TableName:
    Description: "DynamoDB table name"
    Value: !Ref TaskHistoryTable
